<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="signin.css">
</head>

<body class="flex items-center justify-center p-6">
    <div class="glass-container">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">Welcome Back</h1>
            <p class="text-gray-400">Sign in to your account</p>
        </div>

        <form id="signInForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required
                    class="input-field w-full px-4 py-3 rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="loginPass" placeholder="Enter your password" required
                        class="input-field w-full px-4 py-3 rounded-lg pr-10">
                    <button type="button" onclick="toggle('loginPass')"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center">
                    <input type="checkbox" class="rounded border-gray-700 bg-black text-green-500 mr-2">
                    <span class="text-gray-300">Remember me</span>
                </label>
                <a href="forgot.html" class="text-green-500 hover:underline">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary w-full py-3 rounded-lg text-black font-bold text-lg">Sign
                In</button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-800"></div>
            </div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-[#0a0a0a] text-gray-500">Or continue
                    with</span></div>
        </div>

        <button
            class="w-full flex items-center justify-center py-3 border border-gray-800 rounded-lg hover:bg-gray-900 transition-colors">
            <svg class="w-6 h-6 mr-2" viewBox="0 0 24 24">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span class="text-white font-medium">Google</span>
        </button>

        <p class="text-center text-gray-400 text-sm mt-8">
            Don't have an account? <a href="signup.html" class="text-green-500 font-semibold hover:underline">Sign
                up</a>
        </p>
    </div>

<script>
    function toggle(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }

    document.getElementById("signInForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("loginPass").value;

        try {
            const response = await fetch("http://127.0.0.1:8000/api/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

           if (response.ok) {
    // save logged-in user (full object)
    localStorage.setItem("user", JSON.stringify(data));

    // 🔥 ALSO save email + name separately (what modal expects)
    localStorage.setItem("user_email", data.email);
    localStorage.setItem("user_name", data.name);

    // redirect to homepage
    window.location.href = "../HomePage/index.html";
}
else {
                alert(data.detail || "Login failed");
            }

        } catch (error) {
            alert("Backend not reachable");
            console.error(error);
        }
    });
</script>

</body>

</html>
