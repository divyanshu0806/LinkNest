<link href="https://fonts.googleapis.com/css2?family=Inter&family=Roboto&family=Montserrat&family=Oswald&family=PT+Serif&family=Bellota&family=Courier+Prime&display=swap" rel="stylesheet">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bellota:wght@400;700&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Charm:wght@400;700&family=Courier+Prime:wght@400;700&family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Oswald:wght@400;500;700&family=PT+Serif:wght@400;700&family=Playfair+Display:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="hidden-opacity">

    <main id="appContainer" class="min-h-screen flex flex-col items-center py-12 px-4 transition-colors duration-300">
        
        <div class="w-full max-w-md text-center mb-8 animate-fade-in-down">
            <div id="profileImageContainer" class="w-28 h-28 mx-auto rounded-full overflow-hidden mb-4 border-4 border-opacity-20 border-white shadow-xl relative">
                </div>
            <h1 id="profileTitle" class="text-2xl font-bold mb-1 tracking-tight">Loading...</h1>
            <p id="profileUsername" class="opacity-80 text-sm font-medium">@...</p>
        </div>

        <div id="linksList" class="w-full max-w-md space-y-4 animate-fade-in-up">
            </div>

        <footer class="mt-12 text-center opacity-60 text-xs font-light">
            <p>Powered by <span class="font-bold">SmartHub</span></p>
        </footer>

    </main>

    <div id="qrModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center relative shadow-2xl transform transition-all scale-95 opacity-0 modal-content">
            <button onclick="closeQrModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 transition-colors">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
            
            <h3 class="text-xl font-bold text-gray-800 mb-2">Share this Link</h3>
            <p class="text-sm text-gray-500 mb-6 break-all" id="qrLinkUrl">...</p>
            
            <div class="bg-gray-100 p-4 rounded-xl inline-block mb-4">
                <img id="qrImage" src="" alt="QR Code" class="w-48 h-48 object-contain">
            </div>
            
            <button onclick="downloadQr()" class="w-full py-3 bg-gray-900 text-white rounded-xl font-medium hover:bg-black transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-download"></i> Download QR
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <i class="fa-solid fa-check-circle text-green-400"></i>
        <span id="toastMsg">Action Successful</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
