<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Hub Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bellota:wght@400;700&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Charm:wght@400;700&family=Courier+Prime:wght@400;700&family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Oswald:wght@400;500;700&family=PT+Serif:wght@400;700&family=Playfair+Display:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-900 text-white">

    <button onclick="openHubModal()" class="fixed bottom-10 right-10 px-6 py-3 bg-blue-600 rounded-full shadow-lg hover:bg-blue-700 transition-all z-50 font-bold flex items-center">
        <i class="fa-solid fa-plus mr-2"></i> Create Hub
    </button>

    <div id="createHubModal" class="fixed inset-0 z-[100] hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-black bg-opacity-90 transition-opacity backdrop-blur-sm" id="modalBackdrop"></div>

        <div class="fixed inset-0 z-10 overflow-hidden">
            <div class="flex min-h-full items-center justify-center p-4">

                <div id="modalContent" class="relative w-full max-w-7xl h-[90vh] transform overflow-hidden rounded-2xl bg-black border border-zinc-800 shadow-2xl transition-all flex">

                    <div class="w-3/5 overflow-y-auto custom-scrollbar border-r border-zinc-800 pb-28">
                        <div class="p-8">

                            <div class="flex items-center justify-between mb-8">
                                <div>
                                    <h3 class="text-2xl font-bold text-white" id="modal-title">Create New Hub</h3>
                                    <p class="text-sm text-gray-500 mt-1">Design your personalized link hub</p>
                                </div>
                                <button type="button" id="closeModalBtn" class="text-gray-400 hover:text-white hover:bg-zinc-800 transition-colors rounded-lg p-2">
                                    <i class="fa-solid fa-times text-xl"></i>
                                </button>
                            </div>

                            <form id="hubForm" class="space-y-6">

                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-2">Profile Image</label>
                                    <div class="flex items-center gap-4">
                                        <div id="profileUploadArea" class="w-24 h-24 bg-zinc-900 border-2 border-dashed border-zinc-700 rounded-full flex items-center justify-center cursor-pointer hover:border-green-500 hover:bg-green-500/5 transition-all group relative overflow-hidden">
                                            <input type="file" id="profileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                                            <div id="profilePlaceholder" class="flex flex-col items-center gap-1">
                                                <i class="fa-solid fa-user text-3xl text-gray-500 group-hover:text-green-500 transition-colors"></i>
                                            </div>
                                            <img id="profilePreview" class="hidden w-full h-full object-cover rounded-full">
                                        </div>
                                        <div class="flex-1">
                                            <p class="text-xs text-gray-400 mb-1">Recommended: 400x400px</p>
                                            <p class="text-xs text-gray-600">PNG, JPG (Max 5MB)</p>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Hub Title <span class="text-red-500">*</span></label>
                                    <input type="text" id="hubTitle" placeholder="Your Name" maxlength="60" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-colors">
                                    <div class="flex justify-between items-center mt-1">
                                        <span id="titleError" class="text-xs text-red-500 hidden"></span>
                                        <span id="titleCounter" class="text-xs text-gray-500">0 / 60</span>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Username <span class="text-red-500">*</span></label>
                                    <input type="text" id="urlSlug" placeholder="yourhandle" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-colors">
                                    <div class="flex justify-between items-center mt-1">
                                        <p class="text-xs text-gray-500">linkin.bio/<span id="slugPreview" class="text-green-500">yourhandle</span></p>
                                        <span id="slugError" class="text-xs text-red-500 hidden"></span>
                                    </div>
                                </div>

                                <div class="border-t border-zinc-800 my-6"></div>

                                <div>
                                    <h4 class="text-white font-semibold text-base mb-4 flex items-center gap-2">
                                        <i class="fa-solid fa-palette text-green-500"></i>
                                        Choose Theme
                                    </h4>

                                    <div class="grid grid-cols-4 gap-3 mb-4">
                                        <div class="theme-card active" data-theme="custom">
                                            <div class="border-2 border-green-500 rounded-lg p-3 cursor-pointer hover:scale-105 transition-transform bg-zinc-900">
                                                <div class="aspect-square bg-zinc-800 rounded-lg mb-2 flex items-center justify-center">
                                                    <i class="fa-solid fa-palette text-gray-400"></i>
                                                </div>
                                                <p class="text-xs text-center text-white font-medium">Custom</p>
                                            </div>
                                        </div>

                                        <div class="theme-card" data-theme="cleanWhite">
                                            <div class="border-2 border-transparent rounded-lg p-3 cursor-pointer hover:scale-105 transition-transform hover:border-zinc-600 bg-zinc-900">
                                                <div class="aspect-square bg-white border border-gray-200 rounded-lg mb-2 flex flex-col gap-1 p-2 justify-center">
                                                    <div class="w-full h-2 border border-black rounded-sm"></div>
                                                </div>
                                                <p class="text-xs text-center text-gray-400">Clean</p>
                                            </div>
                                        </div>

                                        <div class="theme-card" data-theme="darkTextured">
                                            <div class="border-2 border-transparent rounded-lg p-3 cursor-pointer hover:scale-105 transition-transform hover:border-zinc-600 bg-zinc-900">
                                                <div class="aspect-square bg-[#222] rounded-lg mb-2 flex flex-col gap-1 p-2 justify-center border border-gray-700">
                                                    <div class="w-full h-2 border border-white rounded-sm"></div>
                                                </div>
                                                <p class="text-xs text-center text-gray-400">Dark Tex</p>
                                            </div>
                                        </div>

                                        <div class="theme-card" data-theme="pastelGradient">
                                            <div class="border-2 border-transparent rounded-lg p-3 cursor-pointer hover:scale-105 transition-transform hover:border-zinc-600 bg-zinc-900">
                                                <div class="aspect-square bg-gradient-to-b from-[#fef3c7] via-[#dcfce7] to-[#dbeafe] rounded-lg mb-2 flex flex-col gap-1 p-2 justify-center">
                                                    <div class="w-full h-2 border border-[#d97706] rounded-full"></div>
                                                </div>
                                                <p class="text-xs text-center text-gray-400">Pastel</p>
                                            </div>
                                        </div>

                                        <div class="theme-card" data-theme="mintGreen">
                                            <div class="border-2 border-transparent rounded-lg p-3 cursor-pointer hover:scale-105 transition-transform hover:border-zinc-600 bg-zinc-900">
                                                <div class="aspect-square bg-[#c5eadd] rounded-lg mb-2 flex flex-col gap-1 p-2 justify-center">
                                                    <div class="w-full h-2 bg-[#9abfad] rounded-sm"></div>
                                                </div>
                                                <p class="text-xs text-center text-gray-400">Mint</p>
                                            </div>
                                        </div>

                                        <div class="theme-card" data-theme="mocha">
                                            <div class="border-2 border-transparent rounded-lg p-3 cursor-pointer hover:scale-105 transition-transform hover:border-zinc-600 bg-zinc-900">
                                                <div class="aspect-square bg-[#ccb7a8] rounded-lg mb-2 flex flex-col gap-1 p-2 justify-center">
                                                    <div class="w-full h-2 bg-[#e6dcd3] rounded-sm"></div>
                                                </div>
                                                <p class="text-xs text-center text-gray-400">Mocha</p>
                                            </div>
                                        </div>

                                        <div class="theme-card" data-theme="deepBlue">
                                            <div class="border-2 border-transparent rounded-lg p-3 cursor-pointer hover:scale-105 transition-transform hover:border-zinc-600 bg-zinc-900">
                                                <div class="aspect-square bg-[#0e7490] rounded-lg mb-2 flex flex-col gap-1 p-2 justify-center">
                                                    <div class="w-full h-2 bg-[#a5f3fc] rounded-sm"></div>
                                                </div>
                                                <p class="text-xs text-center text-gray-400">Ocean</p>
                                            </div>
                                        </div>
                                        
                                        <div class="theme-card" data-theme="cyber">
                                            <div class="border-2 border-transparent rounded-lg p-3 cursor-pointer hover:scale-105 transition-transform hover:border-zinc-600 bg-zinc-900">
                                                <div class="aspect-square bg-black rounded-lg mb-2 flex flex-col gap-1 p-2 border border-pink-500">
                                                    <div class="w-full h-2 bg-pink-500 rounded"></div>
                                                </div>
                                                <p class="text-xs text-center text-gray-400">Cyber</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div id="customColorSection" class="space-y-4">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-400 mb-2">Accent Color</label>
                                            <div class="flex gap-2 mb-3 flex-wrap">
                                                <div class="color-swatch active w-9 h-9 rounded-lg cursor-pointer border-2 border-white hover:scale-110 transition-transform" data-color="#0FFF50" style="background: #0FFF50;"></div>
                                                <div class="color-swatch w-9 h-9 rounded-lg cursor-pointer border-2 border-transparent hover:scale-110 transition-transform" data-color="#3b82f6" style="background: #3b82f6;"></div>
                                                <div class="color-swatch w-9 h-9 rounded-lg cursor-pointer border-2 border-transparent hover:scale-110 transition-transform" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
                                                <div class="color-swatch w-9 h-9 rounded-lg cursor-pointer border-2 border-transparent hover:scale-110 transition-transform" data-color="#ec4899" style="background: #ec4899;"></div>
                                                <div class="color-swatch w-9 h-9 rounded-lg cursor-pointer border-2 border-transparent hover:scale-110 transition-transform" data-color="#f59e0b" style="background: #f59e0b;"></div>
                                                <div class="color-swatch w-9 h-9 rounded-lg cursor-pointer border-2 border-transparent hover:scale-110 transition-transform" data-color="#ef4444" style="background: #ef4444;"></div>
                                            </div>

                                            <div class="flex gap-2">
                                                <div class="relative flex-1">
                                                    <div id="colorPreview" class="absolute left-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded bg-[#0FFF50] border border-zinc-600"></div>
                                                    <input type="text" id="customColor" value="#0FFF50" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg pl-12 pr-4 py-2.5 text-white focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 uppercase transition-colors">
                                                </div>
                                                <label for="colorPicker" class="p-2.5 border border-zinc-700 rounded-lg hover:bg-zinc-800 hover:border-green-500 text-gray-400 hover:text-green-500 cursor-pointer transition-all">
                                                    <i class="fa-solid fa-palette"></i>
                                                    <input type="color" id="colorPicker" value="#0FFF50" class="absolute opacity-0 pointer-events-none">
                                                </label>
                                            </div>
                                        </div>

                                        <div>
                                            <label class="block text-sm font-medium text-gray-400 mb-2">Background</label>
                                            <select id="bgSelect" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2.5 text-white appearance-none focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 cursor-pointer transition-colors">
                                                <option value="black">Black</option>
                                                <option value="dark-grey">Dark Grey</option>
                                                <option value="deep-blue">Deep Blue</option>
                                                <option value="gradient">Gradient</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-2">Font Style</label>
                                    <select id="fontSelect" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2.5 text-white appearance-none focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 cursor-pointer transition-colors">
                                        <option value="inter">Inter (Default)</option>
                                        <option value="roboto">Roboto (Clean)</option>
                                        <option value="raleway">Raleway (Elegant)</option>
                                        <option value="montserrat">Montserrat (Modern)</option>
                                        <option value="oswald">Oswald (Strong)</option>
                                        <option value="pt-serif">PT Serif (Classic)</option>
                                        <option value="playfair">Playfair Display (Stylish)</option>
                                        <option value="bodoni">Bodoni Moda (Fashion)</option>
                                        <option value="bellota">Bellota (Cute)</option>
                                        <option value="charm">Charm (Handwritten)</option>
                                        <option value="courier">Courier Prime (Typewriter)</option>
                                        <option value="mono">Roboto Mono (Code)</option>
                                    </select>
                                </div>

                                <div class="border-t border-zinc-800 my-6"></div>

                                <div>
                                    <div class="flex justify-between items-center mb-3">
                                        <h4 class="text-white font-semibold text-base flex items-center gap-2">
                                            <i class="fa-solid fa-link text-green-500"></i>
                                            Links
                                        </h4>
                                        <span id="linkCount" class="text-xs text-gray-500 bg-zinc-900 px-2 py-1 rounded">0 links</span>
                                    </div>

                                    <div id="linksContainer" class="space-y-3 mb-3"></div>

                                    <button type="button" id="addLinkBtn" class="w-full py-2.5 border border-green-500/30 bg-green-500/10 text-green-500 rounded-lg hover:bg-green-500 hover:text-white hover:border-green-500 transition-all text-sm font-medium">
                                        <i class="fa-solid fa-plus mr-2"></i>Add Link
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>

                    <div class="w-2/5 bg-zinc-950 flex items-center justify-center p-8">
                        <div class="relative">
                            <div class="absolute -top-8 left-0 right-0 text-center">
                                <span class="text-sm text-gray-500 bg-zinc-800 px-3 py-1 rounded-full">Live Preview</span>
                            </div>

                            <div id="phoneFrame" class="w-[320px] h-[640px] bg-black rounded-[2.5rem] border-8 border-zinc-800 shadow-2xl overflow-hidden relative">
                                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-zinc-800 rounded-b-2xl z-10"></div>

                                <div id="previewContent" class="w-full h-full overflow-y-auto custom-scrollbar" style="background: #000;">
                                    <div class="p-6 pt-12 flex flex-col items-center min-h-full">

                                        <div id="previewProfile" class="w-24 h-24 rounded-full bg-zinc-800 mb-4 overflow-hidden flex items-center justify-center">
                                            <i class="fa-solid fa-user text-3xl text-gray-600"></i>
                                        </div>

                                        <h1 id="previewTitle" class="text-xl font-bold text-white mb-1">Your Name</h1>
                                        <p id="previewUsername" class="text-sm text-gray-400 mb-6">@yourhandle</p>

                                        <div id="previewLinks" class="w-full space-y-3">
                                            <div class="w-full py-3 px-4 bg-green-500 rounded-full text-center text-black font-medium">
                                                Example Link
                                            </div>
                                        </div>

                                        <div class="mt-auto pt-8 pb-4">
                                            <p class="text-xs text-gray-600 text-center">linkin.bio/<span class="text-green-500">yourhandle</span></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="absolute bottom-0 left-0 right-0 bg-black px-8 py-4 flex items-center justify-between border-t border-zinc-800 w-3/5">
                        <div class="text-xs text-gray-600">
                            <span id="validationStatus"></span>
                        </div>
                        <div class="flex gap-3">
                            <button type="button" id="cancelBtn" class="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white transition-colors">
                                Cancel
                            </button>
                            <button type="button" id="createBtn" class="px-5 py-2 bg-green-500 hover:bg-green-600 text-black text-sm font-bold rounded-lg transition-all shadow-lg shadow-green-500/20 hover:shadow-green-500/30">
                                Create Hub
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
